<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{title}}</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="/static/filex.js"></script>
</head>
<body>
  {{toolbar_html}}
  {{table_html}}
  <script>
    // Persist sort/order across navigation via sessionStorage
    (function() {
      const usp = new URLSearchParams(location.search);
      let sort = usp.get('sort') || 'name';
      let order = usp.get('order') || 'asc';
      if (usp.get('sort')) {
        sessionStorage.setItem('filex_sort', sort);
        sessionStorage.setItem('filex_order', order);
      } else {
        sort = sessionStorage.getItem('filex_sort') || sort;
        order = sessionStorage.getItem('filex_order') || order;
      }
      document.querySelectorAll('a[href]').forEach(function(a) {
        var h = a.getAttribute('href');
        if (h && (h.endsWith('/') || h === '/')) {
          var sep = h.indexOf('?') === -1 ? '?' : '&';
          a.setAttribute('href', h + sep + 'sort=' + sort + '&order=' + order);
        }
      });
    })();
  </script>
</body>
</html>
