<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Indice</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="up"><a href="{{parent}}">&larr; {{parent_label}}</a></div>
    <h1 class="breadcrumb">{{breadcrumb}}</h1>
    <table>
      <thead>
        <tr>
          <th onclick="location.href='?sort=name&order={{name_order}}'">
            Nombre<span class="s">{{name_icon}}</span>
          </th>
          <th onclick="location.href='?sort=size&order={{size_order}}'">
            Tama&ntilde;o<span class="s">{{size_icon}}</span>
          </th>
          <th onclick="location.href='?sort=date&order={{date_order}}'">
            Modificado<span class="s">{{date_icon}}</span>
          </th>
        </tr>
      </thead>
      <tbody>
        {{rows}}
      </tbody>
    </table>
  </body>
  <script>
    // Persist sort/order across navigation via sessionStorage
    (function() {
      const usp = new URLSearchParams(location.search);
      let sort = usp.get('sort') || 'name';
      let order = usp.get('order') || 'asc';
      if (usp.get('sort')) { // only save if explicitly set
        sessionStorage.setItem('filex_sort', sort);
        sessionStorage.setItem('filex_order', order);
      } else {
        sort = sessionStorage.getItem('filex_sort') || sort;
        order = sessionStorage.getItem('filex_order') || order;
      }
      // Append sort/order to every directory link and the parent link
      document.querySelectorAll('a[href]').forEach(function(a) {
        var h = a.getAttribute('href');
        if (h && (h.endsWith('/') || h === '/')) {
          var sep = h.indexOf('?') === -1 ? '?' : '&';
          a.setAttribute('href', h + sep + 'sort=' + sort + '&order=' + order);
        }
      });
    })();
  </script>
</html>
