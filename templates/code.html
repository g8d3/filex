<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{title}}</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.9/ace.js"></script>
  <script src="/static/filex.js"></script>
  <style>
    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding-bottom: 6px;
      margin-bottom: 8px;
    }
    .toolbar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .toolbar-sep { color: #ddd; margin: 0 2px; }
    #editor { min-height: 400px; height: 80vh; border: 1px solid #ccc; border-radius: 4px; }
    pre code.hljs { font-size: var(--content-font-size, 13px); }
    #prefsPanel { background: #f8f8f8; border: 1px solid #e0e0e0; border-radius: 4px; padding: 8px 12px; margin-top: 6px; font-size: 13px; }
    #prefsPanel label { display: inline-flex; align-items: center; gap: 6px; margin-right: 16px; }
    #prefsPanel input[type="range"] { width: 70px; vertical-align: middle; }
  </style>
</head>
<body>
  {{toolbar_html}}

  <div id="viewer">
    <pre><code id="codeBlock" class="{{language}}"></code></pre>
  </div>

  <div id="editor" style="display:none"></div>

  <script>
    ace.config.set('basePath', 'https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.9/');

    const CONTENT = {{json_content}};
    const LANG = {{json_language}};
    const ACE_LANG = {{json_ace_lang}};

    document.getElementById('codeBlock').textContent = CONTENT;
    hljs.highlightElement(document.getElementById('codeBlock'));

    var editor = null;

    document.addEventListener('filex-fontchange', function(e) {
      if (editor) editor.setFontSize(e.detail.size + 'px');
    });

    function toggleEdit() {
      if (editor) {
        editor.destroy(); editor = null;
        document.getElementById('viewer').style.display = 'block';
        document.getElementById('editor').style.display = 'none';
        document.getElementById('editBtn').style.display = '';
        document.getElementById('saveBtn').style.display = 'none';
        document.getElementById('cancelBtn').style.display = 'none';
      } else {
        document.getElementById('viewer').style.display = 'none';
        document.getElementById('editor').style.display = 'block';
        document.getElementById('editBtn').style.display = 'none';
        document.getElementById('saveBtn').style.display = '';
        document.getElementById('cancelBtn').style.display = '';
        editor = ace.edit('editor');
        editor.setTheme('ace/theme/github');
        editor.session.setMode('ace/mode/' + ACE_LANG);
        editor.setValue(CONTENT, -1);
        editor.setOptions({
          fontSize: getFontSize() + 'px', fontFamily: 'monospace',
          wrap: true, showPrintMargin: false, tabSize: 2
        });
        editor.session.getSelection().clearSelection();
        editor.commands.addCommand({
          name: 'saveFile', bindKey: {win: 'Ctrl-S', mac: 'Cmd-S'}, exec: saveFile
        });
      }
    }

    async function saveFile() {
      if (!editor) return;
      var content = editor.getValue();
      var btn = document.getElementById('saveBtn'), msg = document.getElementById('saveMsg');
      btn.disabled = true; msg.textContent = 'Guardando…';
      try {
        var resp = await fetch(window.location.pathname, {
          method: 'POST', headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: 'content=' + encodeURIComponent(content)
        });
        if (resp.ok) { msg.textContent = '✓ Guardado — recargando…'; setTimeout(function() { location.reload(); }, 600); }
        else { msg.textContent = '✗ Error: ' + await resp.text(); btn.disabled = false; }
      } catch(e) { msg.textContent = '✗ Error de red'; btn.disabled = false; }
    }
  </script>
</body>
</html>
